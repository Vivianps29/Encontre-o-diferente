<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontre o Emoji Diferente</title>
    <link rel="stylesheet" href="css/styles1.css">
</head>
<body>
    <!--Cabeçalho-->
    <div class="completo">

        <div class="cabecalho">
            <button id="botao-som">🔊</button>           
            <h1>QUAL É O DIFERENTE?</h1>
            <div class="status">
                <span id="pontos">PONTOS: 0</span>
                <span id="grade">GRADE: --</span>
            </div>    
        </div>

        <div class="controles">
            <p class="instrucao">ESCOLHA SUA MISSÃO:</p>
            <button id="curta">CURTA <br>(5 partidas)</button>
            <button id="longa">LONGA <br>(10 partidas)</button>
        </div>

        <button id="jogar">JOGAR</button>

        <section id="area-jogo" class="oculto"></section>

        <div id="tela-final" class="oculto">
            <h2 id="mensagem-vitoria">Parabéns!</h2>
            <p id="mensagem-pontos">Você encontrou todos!</p>
            <button id="botao-reiniciar">Jogar Novamente</button>
        </div>

        <audio id="musica-fundo" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    </div>
    
    <script src="js/script1.js"></script>
</body>
</html>
