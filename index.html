<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontre o Emoji Diferente</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="completo">
        <div class="cabecalho">
            <button id="botao-som">🔊</button>           
            <h1>QUAL É O DIFERENTE?</h1>

            <!--Deixei os pontos e a grade selecionada juntos para que o jogador consiga acompanhar a todo momento.-->
            <div class="status">
                <span id="pontos">PONTOS: 0</span>
                <span id="grade">GRADE: --</span>
            </div>    
        </div>

        <!--Aqui é onde o jogador irá escolher se quer uma partida curta ou longa-->
        <div class="controles">
            <p> <b> ESCOLHA SUA MISSÃO:</b></p>
            <button id="curta">CURTA <br>(5 partidas)</button>
            <button id="longa">LONGA <br>(10 partidas)</button>
        </div>

        <!--Lugar onde o jogador insere o nome, que servirá para mostrar no ranking e na mensagem de parabéns-->
        <input type="text" id="nome-jogador" placeholder="Digite seu nome" autocomplete="off">

        <button id="jogar">JOGAR</button>

        <!--Deixei essa área oculta e ela só deve aparecer quando a partida iniciar.-->
        <section id="area-jogo" class="oculto"></section>

        <!--Criei essa tela separada para organizar o fim da partida, com o ranking, mensagem de vitória e a opção de jogar novamente.-->
        <div id="tela-final" class="oculto">
            <h2 id="mensagem-vitoria"></h2>
            <p id="mensagem-pontos"></p>    
            <div id="ranking">
                <h3>OS MELHORES DA MISSÃO</h3>
                <ol id="lista-ranking"></ol>
            </div>
            <button id="botao-reiniciar">Jogar Novamente</button>
        </div>

        <!--Adicionei o áudio como meu diferencial, que pode ser controladi pelo botão de som usando o JavaScript.-->
        <audio id="musica-fundo" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
